<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tu suscripción termina pronto</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:'Helvetica Neue',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f5;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">

          <!-- Header -->
          <tr>
            <td style="padding:0;line-height:0;">
              <img src="https://img.mailinblue.com/9520635/images/content_library/original/68b8baa8f0d7493c98dfcb51.jpg"
                   alt="13go" width="560" style="display:block;width:100%;max-width:560px;border:0;">
            </td>
          </tr>

          <!-- Cuerpo -->
          <tr>
            <td style="padding:40px 40px 24px;">
              <!-- Mensaje dinámico según días -->
              {{MENSAJE_INTRO}}

              <!-- Tarjeta de datos -->
              <table width="100%" cellpadding="0" cellspacing="0" style="background:#fff7ed;border:1px solid #fed7aa;border-radius:6px;margin-bottom:28px;">
                <tr>
                  <td style="padding:20px 24px;">
                    <p style="margin:0 0 4px;font-size:11px;font-weight:700;color:#9a3412;text-transform:uppercase;letter-spacing:0.5px;">Detalles de tu plan</p>
                    <table width="100%" cellpadding="0" cellspacing="0" style="margin-top:12px;">
                      <tr>
                        <td style="font-size:13px;color:#6b7280;padding:4px 0;width:130px;">Plan</td>
                        <td style="font-size:13px;color:#111827;font-weight:700;">{{PLAN}}</td>
                      </tr>
                      <tr>
                        <td style="font-size:13px;color:#6b7280;padding:4px 0;">Inicio del período</td>
                        <td style="font-size:13px;color:#111827;font-weight:700;">{{INICIO_PLAN}}</td>
                      </tr>
                      <tr>
                        <td style="font-size:13px;color:#6b7280;padding:4px 0;">Fin del período</td>
                        <td style="font-size:13px;color:#111827;font-weight:700;">{{FIN_PLAN}}</td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>

              <!-- Bloque de oferta -->
              {{OFERTA_BLOQUE}}

              <p style="margin:0;font-size:14px;color:#374151;line-height:1.7;">
                ¿Tienes alguna consulta o necesitas ayuda? Estamos aquí para ti.<br>
                Escríbenos a <a href="mailto:soporte13go@13.cl" style="color:#ea580c;font-weight:700;text-decoration:none;">soporte13go@13.cl</a>
                y te responderemos a la brevedad.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:0;line-height:0;">
              <img src="https://img.mailinblue.com/9520635/images/content_library/original/68b8baa8f0d7493c98dfcb53.jpg"
                   alt="13go" width="560" style="display:block;width:100%;max-width:560px;border:0;">
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
